<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- เงารถ -->
  <ellipse cx="200" cy="180" rx="120" ry="15" fill="#00000020"/>
  
  <!-- ตัวรถหลัก -->
  <rect x="60" y="120" width="280" height="40" rx="5" fill="#DC143C" stroke="#8B0000" stroke-width="2"/>
  
  <!-- หลังคา -->
  <path d="M100 120 L130 80 L270 80 L300 120 Z" fill="#DC143C" stroke="#8B0000" stroke-width="2"/>
  
  <!-- กระจกหน้า -->
  <path d="M130 120 L150 85 L250 85 L270 120 Z" fill="#D3D3D3" stroke="#696969" stroke-width="2"/>
  
  <!-- กระจกข้าง -->
  <path d="M105 120 L125 85 L145 85 L125 120 Z" fill="#D3D3D3" stroke="#696969" stroke-width="2"/>
  <path d="M275 120 L255 85 L275 85 L295 120 Z" fill="#D3D3D3" stroke="#696969" stroke-width="2"/>
  
  <!-- ไฟหน้า -->
  <circle cx="340" cy="135" r="12" fill="#FFFFE0" stroke="#FFD700" stroke-width="2"/>
  <circle cx="60" cy="135" r="12" fill="#FFFFE0" stroke="#FFD700" stroke-width="2"/>
  
  <!-- กันชนหน้า -->
  <rect x="340" y="125" width="15" height="20" rx="3" fill="#8B0000" stroke="#000000" stroke-width="1"/>
  <rect x="45" y="125" width="15" height="20" rx="3" fill="#8B0000" stroke="#000000" stroke-width="1"/>
  
  <!-- ล้อหลัง -->
  <circle cx="120" cy="160" r="25" fill="#2F2F2F" stroke="#000000" stroke-width="3"/>
  <circle cx="120" cy="160" r="15" fill="#1C1C1C" stroke="#000000" stroke-width="2"/>
  <circle cx="120" cy="160" r="8" fill="#4A4A4A"/>
  
  <!-- ล้อหน้า -->
  <circle cx="280" cy="160" r="25" fill="#2F2F2F" stroke="#000000" stroke-width="3"/>
  <circle cx="280" cy="160" r="15" fill="#1C1C1C" stroke="#000000" stroke-width="2"/>
  <circle cx="280" cy="160" r="8" fill="#4A4A4A"/>
  
  <!-- รายละเอียดล้อ (ลาย) -->
  <g stroke="#000000" stroke-width="1" fill="none">
    <!-- ล้อหลัง -->
    <line x1="105" y1="160" x2="135" y2="160"/>
    <line x1="120" y1="145" x2="120" y2="175"/>
    <line x1="109" y1="149" x2="131" y2="171"/>
    <line x1="109" y1="171" x2="131" y2="149"/>
    
    <!-- ล้อหน้า -->
    <line x1="265" y1="160" x2="295" y2="160"/>
    <line x1="280" y1="145" x2="280" y2="175"/>
    <line x1="269" y1="149" x2="291" y2="171"/>
    <line x1="269" y1="171" x2="291" y2="149"/>
  </g>
  
  <!-- ประตู -->
  <line x1="180" y1="120" x2="180" y2="160" stroke="#8B0000" stroke-width="2"/>
  <line x1="220" y1="120" x2="220" y2="160" stroke="#8B0000" stroke-width="2"/>
  
  <!-- มือจับประตู -->
  <rect x="175" y="140" width="8" height="4" rx="2" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
  <rect x="217" y="140" width="8" height="4" rx="2" fill="#C0C0C0" stroke="#808080" stroke-width="1"/>
  
  <!-- ไฟท้าย -->
  <rect x="350" y="130" width="8" height="15" rx="2" fill="#FF4500" stroke="#8B0000" stroke-width="1"/>
  
  <!-- เส้นตกแต่งตัวรถ -->
  <line x1="70" y1="140" x2="330" y2="140" stroke="#8B0000" stroke-width="1"/>
  <line x1="70" y1="150" x2="330" y2="150" stroke="#8B0000" stroke-width="1"/>
</svg>
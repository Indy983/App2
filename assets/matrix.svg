<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Blackboard at front (darker green with rounded corners) -->
  <rect x="250" y="30" width="300" height="80" fill="#1b5e20" stroke="#000000" stroke-width="3" rx="8"/>
  <text x="400" y="80" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Blackboard</text>
  
  <!-- Ceiling light -->
  <ellipse cx="400" cy="15" rx="35" ry="10" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  
  <!-- Teacher's desk (in front of blackboard, shifted right, changed color to brown) -->
  <rect x="480" y="130" width="120" height="70" fill="#8b5a2b" stroke="#5c4033" stroke-width="4" rx="8"/>
  <text x="540" y="170" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Teacher</text>
  
  <!-- Student desks arranged in 4x3 matrix (4 columns x 3 rows, centered like blackboard) -->
  <!-- Row 1 (i=1) -->
  <g id="row1">
    <!-- Desk a₁₁ -->
    <rect x="220" y="220" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="260" y="250" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="275" y="260" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₁₁</text>
    
    <!-- Desk a₁₂ -->
    <rect x="320" y="220" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="360" y="250" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="375" y="260" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₁₂</text>
    
    <!-- Desk a₁₃ -->
    <rect x="420" y="220" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="460" y="250" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="475" y="260" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₁₃</text>
    
    <!-- Desk a₁₄ -->
    <rect x="520" y="220" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="560" y="250" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="575" y="260" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₁₄</text>
  </g>
  
  <!-- Row 2 (i=2) -->
  <g id="row2">
    <!-- Desk a₂₁ -->
    <rect x="220" y="310" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="260" y="340" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="275" y="350" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₂₁</text>
    
    <!-- Desk a₂₂ -->
    <rect x="320" y="310" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="360" y="340" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="375" y="350" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₂₂</text>
    
    <!-- Desk a₂₃ -->
    <rect x="420" y="310" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="460" y="340" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="475" y="350" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₂₃</text>
    
    <!-- Desk a₂₄ -->
    <rect x="520" y="310" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="560" y="340" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="575" y="350" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₂₄</text>
  </g>
  
  <!-- Row 3 (i=3) -->
  <g id="row3">
    <!-- Desk a₃₁ -->
    <rect x="220" y="400" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="260" y="430" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="275" y="440" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₃₁</text>
    
    <!-- Desk a₃₂ -->
    <rect x="320" y="400" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="360" y="430" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="375" y="440" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₃₂</text>
    
    <!-- Desk a₃₃ -->
    <rect x="420" y="400" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="460" y="430" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="475" y="440" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₃₃</text>
    
    <!-- Desk a₃₄ -->
    <rect x="520" y="400" width="80" height="60" fill="#ffe0b2" stroke="#cd853f" stroke-width="4" rx="6"/>
    <text x="560" y="430" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="24" font-weight="bold">a</text>
    <text x="575" y="440" text-anchor="middle" fill="#3e2723" font-family="Times, serif" font-size="18">₃₄</text>
  </g>
</svg>